<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CupX UPI</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,sans-serif;
}

body{
background:#f2f6fb;
}

header{
background:white;
padding:12px;
display:flex;
align-items:center;
justify-content:space-between;
border-bottom:1px solid #eee;
}

.header-left{
display:flex;
align-items:center;
gap:10px;
}

.header-left img{
height:26px;
}

.container{
max-width:600px;
margin:auto;
padding:15px;
}

.card{
background:white;
padding:15px;
border-radius:14px;
margin-bottom:14px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.balance-box{
display:flex;
justify-content:space-between;
align-items:center;
}

.balance{
font-size:26px;
font-weight:600;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.btn{
padding:14px;
border-radius:12px;
border:none;
color:white;
font-weight:500;
cursor:pointer;
}

.blue{
background:linear-gradient(45deg,#2b66d9,#4b8df8);
}

.green{
background:linear-gradient(45deg,#0aa37f,#19c5a4);
}

.transaction{
padding:12px;
border-radius:12px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
}

.credit{
background:#e8f8ef;
border:1px solid #8fd1a6;
}

.debit{
background:#fdeeee;
border:1px solid #e9a4a4;
}

.footer{
display:flex;
gap:10px;
margin-top:15px;
}

.footer button{
flex:1;
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
}

.back{
background:#2b66d9;
color:white;
}

.visit{
background:#19c5a4;
color:white;
}

</style>

</head>

<body>

<header>

<div class="header-left">
<button onclick="goBack()">←</button>

<img src="https://upload.wikimedia.org/wikipedia/commons/5/55/BHIM_UPI_Logo.png">

<div>CUPX UPI</div>

</div>

<div id="user"></div>

</header>

<div class="container">

<h2 id="hello">Hello</h2>

<div class="card">

<div class="balance-box">

<div>

<div>Current Account</div>

<div class="balance" id="balance">XXXX.XX</div>

</div>

<button onclick="toggleBalance()">View Balance</button>

</div>

</div>

<h3>Manage UPI</h3>

<div class="grid">

<button class="btn blue" onclick="pinAction()" id="pinBtn">
Set UPI PIN
</button>

<button class="btn green" onclick="toggleBalance()">
Check Balance
</button>

</div>

<h3 style="margin-top:15px;">Transaction History</h3>

<div id="transactions"></div>

<div class="footer">

<button class="back" onclick="goBack()">Back</button>

<button class="visit" onclick="visitCupx()">Visit CupX</button>

</div>

</div>

<script>

const supabase = window.supabase.createClient(
"https://astnfrwbebzxcxlltpkn.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFzdG5mcndiZWJ6eGN4bGx0cGtuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMjg2OTIsImV4cCI6MjA5MDgwNDY5Mn0.gqp08ROPoDZWyE0KVtV-VCFdTmEXl4HOEL8v7Xjd0I4"
)

let user
let showBalance=false

async function init(){

const session = JSON.parse(localStorage.getItem("cupx_session"))

if(!session){
location.href="https://auth.cupx.in"
return
}

const { data } = await supabase
.from("users")
.select("*")
.eq("username",session.username)
.single()

user=data

document.getElementById("user").innerText=user.username
document.getElementById("hello").innerText="Hello, "+user.username+"!"

if(user.upi_pin){
document.getElementById("pinBtn").innerText="Change UPI PIN"
}

loadTransactions()

}

function toggleBalance(){

showBalance=!showBalance

if(showBalance){
document.getElementById("balance").innerText="₹"+(user.balance||0)
}else{
document.getElementById("balance").innerText="XXXX.XX"
}

}

async function pinAction(){

let pin=prompt("Enter 4 digit UPI PIN")

if(!pin || pin.length!=4){
alert("Invalid PIN")
return
}

await supabase
.from("users")
.update({
upi_pin:pin
})
.eq("id",user.id)

alert("UPI PIN Saved")

}

async function loadTransactions(){

const { data } = await supabase
.from("transactions")
.select("*")
.or(`from_user.eq.${user.username},to_user.eq.${user.username}`)
.order("created_at",{ascending:false})
.limit(10)

const container=document.getElementById("transactions")

data.forEach(t=>{

let type = t.to_user==user.username ? "credit":"debit"

const div=document.createElement("div")

div.className="transaction "+type

div.innerHTML=`

<div>

<div>${t.type || "Payment"}</div>

<div>${new Date(t.created_at).toLocaleString()}</div>

</div>

<div>

${type=="credit" ? "+" : "-"} ₹${t.amount}

</div>

`

container.appendChild(div)

})

}

function goBack(){
window.history.back()
}

function visitCupx(){
location.href="https://cupx.in"
}

init()

</script>

</body>

</html>
