<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CupX UPI</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: system-ui,-apple-system,sans-serif;
}

body{
background:#f6f7fb;
color:#111;
}

header{
background:#003366;
color:white;
padding:16px;
display:flex;
align-items:center;
gap:10px;
}

header img{
height:28px;
}

.container{
max-width:700px;
margin:auto;
padding:15px;
}

.card{
background:white;
border-radius:12px;
padding:16px;
margin-bottom:14px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.balance{
font-size:28px;
font-weight:600;
margin-top:5px;
}

.upi{
font-size:18px;
font-weight:600;
}

.small{
font-size:13px;
color:#666;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#003366;
color:white;
font-size:14px;
cursor:pointer;
}

button.secondary{
background:#e9eefc;
color:#003366;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
margin-top:8px;
}

.transaction{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #eee;
}

.amount{
font-weight:600;
}

.footer{
text-align:center;
font-size:12px;
color:#777;
margin-top:20px;
}

</style>

</head>

<body>

<header>
<img src="https://upload.wikimedia.org/wikipedia/commons/5/55/BHIM_UPI_Logo.png">
<div>CupX UPI</div>
</header>

<div class="container">

<div class="card">
<div>Balance</div>
<div class="balance" id="balance">₹0</div>
</div>

<div class="card">
<div class="upi" id="upiId">loading...</div>
<div class="small">Your UPI ID</div>
</div>

<div class="card grid">
<button onclick="showPin()">Set / Update PIN</button>
<button class="secondary" onclick="logout()">Logout</button>
</div>

<div class="card" id="pinBox" style="display:none">
<div>UPI PIN</div>
<input type="password" id="pin" placeholder="Enter 4 digit pin">
<button onclick="savePin()">Save</button>
</div>

<div class="card">
<div>Mini Passbook</div>
<div id="transactions"></div>
</div>

<div class="footer">
NPCI Inspired • CupX Payments
</div>

</div>

<script>

const supabase = window.supabase.createClient(
"https://astnfrwbebzxcxlltpkn.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFzdG5mcndiZWJ6eGN4bGx0cGtuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMjg2OTIsImV4cCI6MjA5MDgwNDY5Mn0.gqp08ROPoDZWyE0KVtV-VCFdTmEXl4HOEL8v7Xjd0I4"
)

let user

async function init(){

const session = JSON.parse(localStorage.getItem("cupx_session"))

if(!session){
location.href="https://auth.cupx.in"
return
}

const { data } = await supabase
.from("users")
.select("*")
.eq("username",session.username)
.single()

user=data

document.getElementById("balance").innerText="₹"+(user.balance||0)
document.getElementById("upiId").innerText=(user.upi_id || user.username+"@cupx")

loadTransactions()

}

async function loadTransactions(){

const { data } = await supabase
.from("transactions")
.select("*")
.or(`from_user.eq.${user.username},to_user.eq.${user.username}`)
.order("created_at",{ascending:false})
.limit(10)

const container=document.getElementById("transactions")

container.innerHTML=""

data.forEach(t=>{

const div=document.createElement("div")
div.className="transaction"

let sign = t.to_user==user.username ? "+" : "-"

div.innerHTML=`

<div>

<div>${t.type || "Payment"}</div>
<div class="small">${new Date(t.created_at).toLocaleString()}</div>

</div>

<div class="amount">${sign} ₹${t.amount}</div>

`

container.appendChild(div)

})

}

function showPin(){
document.getElementById("pinBox").style.display="block"
}

async function savePin(){

const pin=document.getElementById("pin").value

if(pin.length!=4){
alert("PIN must be 4 digits")
return
}

await supabase
.from("users")
.update({
upi_pin:pin,
upi_pin_updated_at:new Date()
})
.eq("id",user.id)

alert("PIN Updated")

}

function logout(){
localStorage.removeItem("cupx_session")
location.href="https://auth.cupx.in"
}

init()

</script>

</body>

</html>
