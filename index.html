<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>CupX UPI</title><script src="https://unpkg.com/@supabase/supabase-js@2"></script><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,sans-serif;
}

body{
background:#f4f6fb;
color:#111;
}

/* Header */

header{
background:#00529b;
color:white;
padding:16px;
display:flex;
justify-content:space-between;
align-items:center;
font-weight:600;
}

/* Container */

.container{
max-width:700px;
margin:auto;
padding:16px;
}

/* Cards */

.card{
background:white;
padding:16px;
border-radius:14px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
margin-bottom:16px;
}

/* Balance */

.balance{
font-size:32px;
font-weight:600;
margin-top:6px;
color:#00529b;
}

/* Buttons */

button{
background:#f37021;
color:white;
border:none;
padding:12px;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

button.secondary{
background:#00529b;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

/* Inputs */

input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
margin-top:8px;
}

/* Small */

.small{
font-size:13px;
color:#666;
}

/* UPI */

.upi{
font-size:18px;
font-weight:600;
}

/* Transactions */

.transaction{
display:flex;
justify-content:space-between;
padding:12px 0;
border-bottom:1px solid #eee;
}

.credit{
color:#16a34a;
font-weight:600;
}

.debit{
color:#dc2626;
font-weight:600;
}

/* Footer */

.footer{
text-align:center;
font-size:12px;
color:#777;
margin-top:20px;
}

.logo{
height:28px;
}

</style></head><body><header>
<div style="display:flex;gap:10px;align-items:center">
<img 
src="https://www.bhimupi.org.in/images/bhim_logo.png"
class="logo"
/>
<span>CupX UPI</span>
</div><div id="username"></div>
</header><div class="container"><div class="card">
<div>Available Balance</div>
<div class="balance" id="balance">₹0</div>
</div><div class="card">
<div class="upi" id="upiId"></div>
<div class="small">Your UPI ID</div>
</div><div class="card grid">
<button onclick="showSetPin()">Set / Update PIN</button>
<button class="secondary" onclick="logout()">Logout</button>
</div><div class="card" id="pinBox" style="display:none"><div>Set UPI PIN</div><input 
type="password" 
id="pin" 
placeholder="Enter 4 digit PIN"
/>

<button onclick="savePin()">Save PIN</button>

</div><div class="card"><div style="font-weight:600;margin-bottom:10px">
Mini Passbook
</div><div id="transactions">
Loading...
</div></div><div class="footer">
NPCI Inspired • CupX Payments
</div></div><script>

const supabase = window.supabase.createClient(
"YOUR_SUPABASE_URL",
"YOUR_SUPABASE_ANON_KEY"
)

let userData

async function init(){

const session = localStorage.getItem("cupx_session")

if(!session){
window.location.href="https://auth.cupx.in"
return
}

const parsed = JSON.parse(session)

const { data, error } = await supabase
.from("users")
.select("*")
.eq("username", parsed.username)
.single()

if(error || !data){
window.location.href="https://auth.cupx.in"
return
}

userData=data

document.getElementById("username").innerText=data.username
document.getElementById("balance").innerText="₹"+(data.balance || 0)
document.getElementById("upiId").innerText=
(data.upi_id || data.username+"@cupx")

loadTransactions()

}

async function loadTransactions(){

const { data } = await supabase
.from("transactions")
.select("*")
.or(`from_user.eq.${userData.username},to_user.eq.${userData.username}`)
.order("created_at",{ascending:false})
.limit(10)

let html=""

if(!data || data.length===0){
html="No transactions yet"
}

data.forEach(tx=>{

const credit = tx.to_user===userData.username

html+=`

<div class="transaction">

<div>
<div>${credit?"Received":"Sent"}</div>
<div class="small">
${new Date(tx.created_at).toLocaleString()}
</div>
</div>

<div class="${credit?"credit":"debit"}">
${credit?"+":"-"} ₹${tx.amount}
</div>

</div>

`

})

document.getElementById("transactions").innerHTML=html

}

function showSetPin(){
document.getElementById("pinBox").style.display="block"
}

async function savePin(){

const pin=document.getElementById("pin").value

if(pin.length!=4){
alert("PIN must be 4 digits")
return
}

await supabase
.from("users")
.update({
upi_pin:pin,
upi_pin_updated_at:new Date()
})
.eq("id",userData.id)

alert("PIN updated")

location.reload()

}

function logout(){

localStorage.removeItem("cupx_session")

window.location.href="https://auth.cupx.in"

}

init()

</script></body>
        </html>
