<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>CupX UPI</title><script src="https://unpkg.com/@supabase/supabase-js@2"></script><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,sans-serif;
}

body{
background:#f5f7fb;
color:#111;
}

header{
background:#0b5ed7;
color:white;
padding:18px;
font-size:18px;
font-weight:600;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
padding:16px;
max-width:700px;
margin:auto;
}

.card{
background:white;
padding:18px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
margin-bottom:16px;
}

.balance{
font-size:32px;
font-weight:600;
margin-top:8px;
}

button{
background:#0b5ed7;
color:white;
border:none;
padding:12px;
border-radius:8px;
cursor:pointer;
width:100%;
font-size:15px;
}

button.secondary{
background:#e9eefc;
color:#0b5ed7;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
margin-top:8px;
}

.small{
font-size:13px;
color:#666;
}

.upi{
font-size:18px;
font-weight:600;
}

.transaction{
padding:12px 0;
border-bottom:1px solid #eee;
display:flex;
justify-content:space-between;
}

.credit{
color:#16a34a;
font-weight:600;
}

.debit{
color:#dc2626;
font-weight:600;
}

.footer{
text-align:center;
font-size:12px;
color:#888;
margin-top:20px;
}

</style></head><body><header>
<span>CupX UPI</span>
<span id="username"></span>
</header><div class="container"><div class="card">
<div>Balance</div>
<div class="balance" id="balance">₹0</div>
</div><div class="card">
<div class="upi" id="upiId">Loading...</div>
<div class="small">Your UPI ID</div>
</div><div class="card grid">
<button onclick="showSetPin()">Set / Update UPI PIN</button>
<button class="secondary" onclick="logout()">Logout</button>
</div><div class="card" id="pinBox" style="display:none">
<div>Set UPI PIN</div>
<input type="password" id="pin" placeholder="Enter 4 digit PIN">
<button onclick="savePin()">Save PIN</button>
</div><div class="card">
<div>Account Info</div>
<div class="small" id="name"></div>
<div class="small" id="email"></div>
</div><div class="card">
<div style="font-weight:600;margin-bottom:10px">
Mini Passbook
</div><div id="transactions">
Loading...
</div></div><div class="footer">
NPCI Inspired • CupX Payments
</div></div><script>

const supabase = window.supabase.createClient(
"https://astnfrwbebzxcxlltpkn.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFzdG5mcndiZWJ6eGN4bGx0cGtuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMjg2OTIsImV4cCI6MjA5MDgwNDY5Mn0.gqp08ROPoDZWyE0KVtV-VCFdTmEXl4HOEL8v7Xjd0I4"
)

let userData

async function init(){

const session = JSON.parse(localStorage.getItem("cupx_session"))

if(!session){
location.href="https://auth.cupx.in"
return
}

const { data } = await supabase
.from("users")
.select("*")
.eq("username", session.username)
.single()

if(!data){
location.href="https://auth.cupx.in"
return
}

userData = data

document.getElementById("username").innerText=data.username
document.getElementById("balance").innerText="₹"+data.balance
document.getElementById("upiId").innerText=data.upi_id || data.username+"@cupx"
document.getElementById("name").innerText=data.full_name || ""
document.getElementById("email").innerText=data.email || ""

loadTransactions()

}

async function loadTransactions(){

const { data } = await supabase
.from("transactions")
.select("*")
.or(`from_user.eq.${userData.username},to_user.eq.${userData.username}`)
.order("created_at",{ascending:false})
.limit(10)

let html=""

if(!data || data.length===0){
html="No transactions yet"
}

data.forEach(tx=>{

const credit = tx.to_user===userData.username

html+=`
<div class="transaction">
<div>
<div>${credit ? "Received" : "Sent"}</div>
<div class="small">${new Date(tx.created_at).toLocaleString()}</div>
</div>

<div class="${credit ? "credit":"debit"}">
${credit?"+":"-"} ₹${tx.amount}
</div>

</div>
`

})

document.getElementById("transactions").innerHTML=html

}

function showSetPin(){
document.getElementById("pinBox").style.display="block"
}

async function savePin(){

const pin=document.getElementById("pin").value

if(pin.length!=4){
alert("PIN must be 4 digits")
return
}

await supabase
.from("users")
.update({
upi_pin: pin,
upi_pin_updated_at:new Date()
})
.eq("id", userData.id)

alert("UPI PIN updated")

location.reload()

}

function logout(){
localStorage.removeItem("cupx_session")
location.href="https://auth.cupx.in"
}

init()

</script></body>
</html>
